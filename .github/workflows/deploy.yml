name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Обновлять данные каждый день в 5:00 UTC (8:00 МСК)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      skip_fetch:
        description: 'Пропустить скачивание расписания (использовать текущие data/ из репозитория)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch schedule data from API
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_fetch != true }}
        continue-on-error: true
        env:
          TOKEN_STUDENTS: ${{ secrets.TOKEN_STUDENTS }}
          TOKEN_TEACHERS: ${{ secrets.TOKEN_TEACHERS }}
        run: python scripts/fetch_data.py

      - name: Skip fetch (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_fetch == true }}
        run: echo "⏭️ Пропускаем скачивание расписания по флагу skip_fetch"

      - name: Check data exists
        run: |
          if [ ! -d data ] || [ ! -f data/students.json ]; then
            echo "::error::Нет данных: API недоступен и data/ отсутствует в репозитории"
            exit 1
          fi
          echo "✅ Данные найдены: $(cat data/meta.json)"

      - name: Prepare site
        run: |
          mkdir _site
          cp index.html styles.css logo.svg _site/
          cp -r js _site/js
          cp -r data _site/data

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
